name: Migrate documentation

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: "Source docs URL"
        required: true
        default: "https://docs.acceldata.io/documentation"
      product_id:
        description: "AccelDocs product/section ID"
        required: true
        default: "414"
      org_id:
        description: "AccelDocs org ID"
        required: true
        default: "3"

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    environment:
      name: production
      url: https://acceldocs-backend.vercel.app
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright pypandoc html2text
      
      - name: Install Playwright browsers
        run: |
          playwright install --with-deps chromium
      
      - name: Run migration
        run: |
          python scripts/migrate_developerhub.py \
            --source "${{ github.event.inputs.source_url }}" \
            --backend "https://acceldocs-backend.vercel.app" \
            --token "${{ secrets.ACCELDOCS_TOKEN }}" \
            --org-id "${{ github.event.inputs.org_id }}" \
            --product-id "760" \
            --deep \
      
      - name: Upload state file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-state
          path: migration_states/*.json