<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}AccelDocs{% endblock %}</title>
  <style>
    :root {
      --bg: #f8fafc; --card: #fff; --text: #0f172a; --muted: #64748b;
      --brand: #0ea5e9; --brand-dark: #0284c7; --success: #16a34a; --danger: #dc2626;
      --warning: #d97706; --border: #e2e8f0; --hover: #f1f5f9;
      --radius: 10px; --shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

    /* Layout */
    .shell { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: #0f172a; color: #e2e8f0; padding: 20px 0; flex-shrink: 0; }
    .sidebar .logo { padding: 0 20px 24px; font-size: 18px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
    .sidebar .logo svg { width: 24px; height: 24px; }
    .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: #94a3b8; text-decoration: none; font-size: 14px; transition: all .15s; }
    .sidebar nav a:hover { background: rgba(255,255,255,.06); color: #e2e8f0; }
    .sidebar nav a.active { background: rgba(14,165,233,.15); color: #38bdf8; border-right: 3px solid #38bdf8; }
    .sidebar nav a svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar .section-label { padding: 20px 20px 6px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #475569; font-weight: 600; }
    .main { flex: 1; padding: 28px 36px; max-width: 1200px; }

    /* Typography */
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

    /* Cards */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
    .card + .card { margin-top: 16px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .card-header h2 { margin-bottom: 0; }

    /* Stats grid */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); }
    .stat .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
    .stat .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    .stat .value.brand { color: var(--brand); }
    .stat .value.success { color: var(--success); }
    .stat .value.warning { color: var(--warning); }
    .stat .value.danger { color: var(--danger); }

    /* Tables */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 12px; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 600; border-bottom: 2px solid var(--border); }
    td { padding: 10px 12px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: var(--hover); }
    .empty-row td { text-align: center; color: var(--muted); padding: 32px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px; background: #fff; color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; text-decoration: none; }
    .btn:hover { background: var(--hover); border-color: #cbd5e1; }
    .btn-primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-success { background: var(--success); color: #fff; border-color: var(--success); }
    .btn-success:hover { opacity: .9; }
    .btn-danger { color: var(--danger); border-color: #fecaca; }
    .btn-danger:hover { background: #fef2f2; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-group { display: flex; gap: 6px; }

    /* Pills / badges */
    .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; }
    .pill-draft { color: #475467; background: #f1f5f9; }
    .pill-review { color: #b54708; background: #fffaeb; }
    .pill-approved { color: #067647; background: #ecfdf3; }
    .pill-rejected { color: #b42318; background: #fef3f2; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; }
    .badge-primary { background: #dbeafe; color: #1e40af; }
    .badge-success { background: #d1fae5; color: #065f46; }
    .badge-info { background: #e0e7ff; color: #3730a3; }
    .badge-warning { background: #fed7aa; color: #92400e; }
    .badge-secondary { background: #f1f5f9; color: #475569; }

    /* Alerts */
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
    .alert-success { background: #ecfdf3; color: #067647; border: 1px solid #abefc6; }
    .alert-error { background: #fef3f2; color: #b42318; border: 1px solid #fecdca; }
    .alert.show { display: block; }

    /* Pre / code */
    pre { background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: 8px; font-size: 13px; overflow-x: auto; white-space: pre-wrap; }

    /* Form inputs */
    .form-input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; transition: border-color .15s; }
    .form-input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }

    /* Utilities */
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    .text-muted { color: var(--muted); }
    .text-sm { font-size: 13px; }
    .mt-2 { margin-top: 8px; }
    .mt-4 { margin-top: 16px; }
    .mb-4 { margin-bottom: 16px; }
    .flex { display: flex; align-items: center; }
    .gap-2 { gap: 8px; }
    .gap-4 { gap: 16px; }
    .justify-between { justify-content: space-between; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { padding: 16px; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        AccelDocs
      </div>
      <nav>
        <a href="/" class="{% if active == 'dashboard' %}active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
          Dashboard
        </a>
        <a href="/documents" class="{% if active == 'documents' %}active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Documents
        </a>
        <a href="/approvals" class="{% if active == 'approvals' %}active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Approvals
          {% if pending_count is defined and pending_count > 0 %}
            <span class="pill pill-review" style="margin-left:auto">{{ pending_count }}</span>
          {% endif %}
        </a>
        <div class="section-label">Operations</div>
        <a href="/sync" class="{% if active == 'sync' %}active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Sync
        </a>
        <div class="section-label">Administration</div>
        <a href="/users" class="{% if active == 'users' %}active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Users
        </a>
      </nav>
    </aside>

    <main class="main">
      <div id="alert" class="alert"></div>
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    function showAlert(msg, type='success') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert alert-' + type + ' show';
      setTimeout(() => el.classList.remove('show'), 5000);
    }
    async function apiFetch(url, opts={}) {
      // Add JSON content-type header if body is provided
      if (opts.body && !(opts.headers && opts.headers['Content-Type'])) {
        opts.headers = { ...opts.headers, 'Content-Type': 'application/json' };
      }
      return await fetch(url, opts);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
